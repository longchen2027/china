  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: apple.com                 
  reality-opts: 
    public-key: Al0bsvXYaQWhaZhjMkTyuMY6DzpmzRbGSmfVXZAi-VY    
    short-id: 22c610d4                      
  client-fingerprint: chrome                  

- name: vmess-ws-2026-clash                         
