proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies:
    - vless-reality-vision-2026-clash                              
    - vmess-ws-2026-clash
    - hysteria2-2026-clash
    - tuic5-2026-clash
    - anytls-2026-clash
    - vmess-tls-argo临时-2026-clash
    - vmess-argo临时-2026-clash

- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
    - vless-reality-vision-2026-clash                              
    - vmess-ws-2026-clash
    - hysteria2-2026-clash
    - tuic5-2026-clash
    - anytls-2026-clash
    - vmess-tls-argo临时-2026-clash
    - vmess-argo临时-2026-clash
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT
    - vless-reality-vision-2026-clash                              
    - vmess-ws-2026-clash
    - hysteria2-2026-clash
    - tuic5-2026-clash
    - anytls-2026-clash
    - vmess-tls-argo临时-2026-clash
    - vmess-argo临时-2026-clash
rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
