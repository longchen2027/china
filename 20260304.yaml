port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: true 
  listen: "0.0.0.0:1053"
  ipv6: true
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: "arc"
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  default-nameserver: ["223.5.5.5", "1.2.4.8"]
  nameserver:
    - "https://208.67.222.222/dns-query"
    - "https://1.1.1.1/dns-query"
    - "https://8.8.4.4/dns-query"
  proxy-server-nameserver:
    - "https://223.5.5.5/dns-query"
    - "https://doh.pub/dns-query"
  nameserver-policy:
    "geosite:private,cn":
      - "https://223.5.5.5/dns-query"
      - "https://doh.pub/dns-query"

proxies:
- name: vless-reality-vision-2027-clash               
  type: vless
  server: 2a01:111:f100:7000::6fdd:5065                           
  port: 27536                                
  uuid: 10cb9a64-4026-429a-8473-12310a934297   
  network: tcp
  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: apple.com                 
  reality-opts: 
    public-key: FOEUZMbRBRqXuuwFE2g2ckp3pKC76DrgYpgLJFqiUV8    
    short-id: 51c5dffd                      
  client-fingerprint: chrome                  

- name: vmess-ws-2027-clash                         
  type: vmess
  server: china.southeastasia.cloudapp.azure.com                        
  port: 2096                                     
  uuid: 10cb9a64-4026-429a-8473-12310a934297       
  alterId: 0
  cipher: auto
  udp: true
  tls: true
  network: ws
  servername: china.southeastasia.cloudapp.azure.com                    
  ws-opts:
    path: "10cb9a64-4026-429a-8473-12310a934297-vm"                             
    headers:
      Host: china.southeastasia.cloudapp.azure.com                     

- name: hysteria2-2027-clash                            
  type: hysteria2                                      
  server: china.southeastasia.cloudapp.azure.com                               
  port: 22674                                
  password: 10cb9a64-4026-429a-8473-12310a934297                          
  alpn:
    - h3
  sni: china.southeastasia.cloudapp.azure.com                               
  skip-cert-verify: false
  fast-open: true

- name: tuic5-2027-clash                            
  server: china.southeastasia.cloudapp.azure.com                      
  port: 40767                                    
  type: tuic
  uuid: 10cb9a64-4026-429a-8473-12310a934297       
  password: 10cb9a64-4026-429a-8473-12310a934297   
  alpn: [h3]
  disable-sni: true
  reduce-rtt: true
  udp-relay-mode: native
  congestion-controller: bbr
  sni: china.southeastasia.cloudapp.azure.com                                
  skip-cert-verify: false



proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies:
    - vless-reality-vision-2027-clash                              
    - vmess-ws-2027-clash
    - hysteria2-2027-clash
    - tuic5-2027-clash


- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
    - vless-reality-vision-2027-clash                              
    - vmess-ws-2027-clash
    - hysteria2-2027-clash
    - tuic5-2027-clash

    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT
    - vless-reality-vision-2027-clash                              
    - vmess-ws-2027-clash
    - hysteria2-2027-clash
    - tuic5-2027-clash

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
